<div class="overlay overlay-bg"></div>
<div class="container">
    <div class="row justify-content-between align-items-center">
        <div class="col-lg-6 reservation-left">
            <h1 class="text-white">Vivez l’Instant Parfait</h1>
            <p class="text-white pt-20">
                Que ce soit un dîner entre amis, une célébration spéciale ou une soirée animée, 
                réservez votre table pour profiter d’une expérience unique : cuisine savoureuse, cocktails 
                créatifs et ambiance festive qui rend chaque moment inoubliable.
            </p>
        </div>
        <div class="col-lg-5 reservation-right">
            <form class="form-wrap text-center" action="https://formsubmit.co/chrinovicnyembo009@gmail.com" method="POST">

                <input type="text" class="form-control" name="name" placeholder="Votre nom complet" required>

                <input type="email" class="form-control" name="email" placeholder="Votre adresse email" required>

                <input type="text" class="form-control" name="phone" placeholder="Numéro de téléphone" required>

                <input type="text" class="form-control date-picker" name="date" placeholder="Date et heure souhaitées" required>

                <div class="form-select form-select-dark">
                    <select name="event_type" class="form-control text-white" style="background:#000; color:#fff;" required>
                        <option value="" disabled selected>Type d'événement</option>
                        <option value="Soirée entre amis">Soirée entre amis</option>
                        <option value="Anniversaire">Anniversaire</option>
                        <option value="Dîner romantique">Dîner romantique</option>
                        <option value="Événement privé / corporatif">Événement privé / corporatif</option>
                    </select>
                </div>

                <input type="hidden" name="_subject" value="Nouvelle réservation">
                <input type="hidden" name="_template" value="table">

                <button type="submit" class="primary-btn text-uppercase mt-20">
                    Réservez votre soirée
                </button>

            </form>
        </div>
    </div>
</div>
